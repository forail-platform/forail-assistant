services:
  forge-assistant:
    build: .
    image: ghcr.io/forgeplatform/forge-assistant:latest
    ports:
      - "8100:8100"
    volumes:
      - assistant_data:/data
    environment:
      - FORGE_ASSISTANT_OLLAMA_MODEL=gemma3:1b
      - FORGE_ASSISTANT_LOG_LEVEL=INFO
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8100/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    restart: unless-stopped

volumes:
  assistant_data:
